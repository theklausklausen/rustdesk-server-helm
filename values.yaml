# Default values for rustdesk-server.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: rustdesk/rustdesk-server
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "1.1.9"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}
podLabels: {}

# Use host network for pods
# When enabled, pods use the host's network namespace.
# This does NOT by itself preserve client IP when traffic comes through a Kubernetes Service.
# It also has important tradeoffs:
#   - Container ports must be unique per node, which limits replicas per node
#   - Reduces network isolation
#   - Direct access to host network interfaces
# Prefer `service.externalTrafficPolicy: Local` for LoadBalancer/NodePort Services when the goal
# is to preserve client source IP. Enable hostNetwork only when direct host networking is required.
hostNetwork: false

# RustDesk server configuration
# IMPORTANT: When using LoadBalancer, you must set the relay server IP
# This tells hbbs what external IP to advertise to clients for peer-to-peer connections
rustdesk:
  # Relay server IP - set this to your LoadBalancer IP or public IP
  # Leave empty when using hostNetwork: true (it will auto-detect)
  # REQUIRED when hostNetwork: false and using LoadBalancer
  relayServer: ""
  # Example: relayServer: "192.168.1.100"

# Service configurations
service:
  # External traffic policy for both services (hbbs and hbbr)
  # Options: Local, Cluster
  # Local preserves client source IP and avoids second hop, but requires healthy local endpoints
  externalTrafficPolicy: Local
  
  # Annotations to add to both services (hbbs and hbbr)
  # Example:
  # annotations:
  #   service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
  #   prometheus.io/scrape: "true"
  #   metallb.universe.tf/allow-shared-ip: "rustdesk"
  annotations: {}
  
  # Labels to add to both services (hbbs and hbbr)
  # Example:
  # labels:
  #   team: infrastructure
  #   environment: production
  labels: {}
  
  # Service-specific configurations
  hbbs:
    # LoadBalancer IP for hbbs service (only used when service type is LoadBalancer)
    # Leave empty to auto-assign
    loadBalancerIP: ""
    # Annotations specific to hbbs service
    annotations: {}
      # service.beta.kubernetes.io/aws-load-balancer-backend-protocol: "tcp"
    # Labels specific to hbbs service
    labels: {}
      # component: signal-server
  
  hbbr:
    # LoadBalancer IP for hbbr service (only used when service type is LoadBalancer)
    # Leave empty to auto-assign
    loadBalancerIP: ""
    # Annotations specific to hbbr service
    annotations: {}
      # service.beta.kubernetes.io/aws-load-balancer-backend-protocol: "tcp"
    # Labels specific to hbbr service
    labels: {}
      # component: relay-server

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

portConfigs:
  hbbr:
    type: ClusterIP
    replayPort:
      port: 21117
      targetPort: 21117
    clientPort:
      enable: false
      port: 21119
      targetPort: 21119
  hbbs:
      type: ClusterIP
      natPort:
        port: 21115
        protocol: TCP
        targetPort: 21115
      registryPort:
        port: 21116
        targetPort: 21116
      heartbeatPort:
        port: 21116
        targetPort: 21116
      webPort:
        port: 21118
        targetPort: 21118
        enable: false
        protocol: TCP


ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources:
  hbbrResource: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi
  hbbsResource: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi


autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# Additional volumes on the output Deployment definition.
volumes:
  - name: rustdesk-data
    emptyDir: {}

# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

# Additional volumeMounts on the output Deployment definition.
volumeMounts:
  hbbrVolumeMounts:
    - name: rustdesk-data
      mountPath: "/root"
  hbbsVolumeMounts:
    - name: rustdesk-data
      mountPath: "/root"



# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

nodeSelector: {}

tolerations: []

affinity: {}
